# EARS / ANTENNAE
# "HeadSide" is preferred, as HeadTop is often used for "mandatory ears" markings (e.g. vulps, tajaran).
# Species restrictions are inverted as they work pretty much fine unless they don't - erring on the side of leniency.

- type: marking
  id: AlienAntenna
  bodyPart: HeadSide
  # markingCategory: HeadSide # Aurora's Song
  # speciesRestriction: [ Resomi ] # Aurora's Song
  # invertSpeciesRestriction: true # Aurora's Song
  sprites:
  - sprite: _DEN/Mobs/Customization/Head/alien_markings.rsi
    state: alien_antenna_double

- type: marking
  id: AlienAntennaSide
  bodyPart: HeadSide
  # markingCategory: HeadSide # Aurora's Song
  # speciesRestriction: [ Resomi ] # Aurora's Song
  # invertSpeciesRestriction: true # Aurora's Song
  sprites:
  - sprite: _DEN/Mobs/Customization/Head/alien_markings.rsi
    state: alien_antenna_side

- type: marking
  id: AlienAntennaSingle
  bodyPart: HeadSide
  # markingCategory: HeadSide # Aurora's Song
  # speciesRestriction: [ Resomi ] # Aurora's Song
  # invertSpeciesRestriction: true # Aurora's Song
  sprites:
  - sprite: _DEN/Mobs/Customization/Head/alien_markings.rsi
    state: alien_antenna_single

# EYES
# Species restrictions are inverted; excluded species are those where the eyes do not fit the head very well,
# such as if the species has very large eyes.

- type: marking
  id: AlienEyes
  bodyPart: Eyes
  # markingCategory: Face # Aurora's Song
  speciesRestriction: [ Moth, Arachnid, IPC, Vox ] # Aurora's Song - removed den species
  invertSpeciesRestriction: true
  coloring:
    default:
      type:
        !type:EyeColoring
  sprites:
  - sprite: _DEN/Mobs/Customization/Head/alien_markings.rsi
    state: eyes_alien

